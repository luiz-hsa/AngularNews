<div style="padding: 20px; font-family: sans-serif; max-width: 1200px; margin: 0 auto;">
  <h1 style="color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px;">AngularNews 📰</h1>
  
  <div style="margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap;">
    <button *ngFor="let cat of categories" 
            (click)="selectCategory(cat)"
            [style.background-color]="activeCategory === cat ? '#007bff' : '#f8f9fa'"
            [style.color]="activeCategory === cat ? '#fff' : '#333'"
            style="padding: 10px 20px; border: 1px solid #ddd; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.2s;">
      {{ cat | titlecase }}
    </button>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
    <div *ngFor="let article of articles" style="border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
      <img [src]="article.urlToImage || 'https://via.placeholder.com/300x150?text=Sem+Imagem'" style="width: 100%; height: 160px; object-fit: cover;">
      
      <div style="padding: 15px; display: flex; flex-direction: column; flex-grow: 1;">
        <h3 style="font-size: 1.1rem; margin: 0 0 10px 0; color: #222; line-height: 1.4;">{{ article.title }}</h3>
        <p style="font-size: 0.9rem; color: #666; flex-grow: 1; line-height: 1.5;">{{ article.description }}</p>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid #f0f0f0;">
          <a [href]="article.url" target="_blank" style="text-decoration: none; color: #007bff; font-weight: bold; font-size: 0.85rem;">Ler Artigo Completo</a>
          <button (click)="toggleFav(article)" style="background: none; border: none; cursor: pointer; font-size: 1.3rem; padding: 0;">
            {{ isFavorite(article.url) ? '❤️' : '🤍' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
